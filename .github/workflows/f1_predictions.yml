name: F1 Race Predictions

on:
  schedule:
    # Run every Thursday at 12:00 UTC (before race weekends)
    - cron: '0 12 * * 4'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-predictions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4

      - name: Checkout F1 prediction repo
        uses: actions/checkout@v4
        with:
          repository: Amar-Sehgal/f1_prediction
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          path: f1-prediction

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          cd f1-prediction
          pip install -r requirements.txt

      - name: Restore FastF1 cache
        uses: actions/cache@v4
        with:
          path: f1-prediction/f1_cache
          key: f1-cache-${{ github.run_number }}
          restore-keys: f1-cache-

      - name: Generate F1 predictions
        run: |
          cd f1-prediction
          python3 generate_web_predictions.py --output ../predictions/f1.json

      - name: Commit and push predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions/f1.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update F1 predictions for $(date -u +%Y-%m-%d)"
            git push
          fi
